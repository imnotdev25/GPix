{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>{{block "title" .}}gpix{{end}}</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/static/styles.css">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;})();</script>
{{block "head" .}}{{end}}
</head>
<body class="{{block "bodyclass" .}}{{end}}">
{{if .User}}
<header class="app-header">
  <div class="header-inner">
    <a class="brand" href="/browse" aria-label="gpix library">
      <span class="brand-mark" aria-hidden="true">g</span>
      <span class="brand-copy">
        <strong>gpix</strong>
        <small>Media server</small>
      </span>
    </a>
    <nav class="primary-nav" aria-label="Primary navigation">
      <a class="nav-link" href="/browse">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span>Library</span>
      </a>
      <a class="nav-link nav-link-primary" href="/upload">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload</span>
      </a>
      <a class="nav-link" href="/settings/gateways">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h11"/><path d="M4 12h16"/><path d="M4 17h7"/><circle cx="18" cy="7" r="2"/><circle cx="13" cy="17" r="2"/></svg>
        <span>Connections</span>
      </a>
      <span class="nav-divider" aria-hidden="true"></span>
      <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <form method="POST" action="/logout">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <button class="icon-button" type="submit" aria-label="Sign out" title="Sign out">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </form>
    </nav>
  </div>
</header>
{{end}}
<main class="app-main">
{{block "content" .}}{{end}}
</main>
<footer class="app-footer">
  <span>gpix{{if .User}} · {{.User}}{{end}}</span>
  {{if .User}}<span class="faint">Private media on your server</span>{{end}}
</footer>
<script src="/static/app.js" defer></script>
{{block "scripts" .}}{{end}}
</body>
</html>{{end}}
